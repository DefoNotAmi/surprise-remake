<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Favorite Human</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600;900&display=swap" rel="stylesheet"> 


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at 50% 20%,#243b68,transparent 35%),
    radial-gradient(circle at bottom,#15102d,transparent 50%),
    #02040d;

    color:white;
    font-family:'Orbitron',sans-serif;

}



/* stars */

.star{

position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;

animation:twinkle infinite alternate;

}


@keyframes twinkle{

from{
opacity:.2;
}

to{
opacity:1;
}

}



/* cursor particles */


.particle{

position:absolute;
width:7px;
height:7px;

background:#bdeaff;

border-radius:50%;

box-shadow:
0 0 15px #8bdcff;

pointer-events:none;

animation:explode .9s forwards;

}


@keyframes explode{

100%{

transform:
translateY(-40px)
scale(0);

opacity:0;

}

}





/* planets */


.planet{

position:absolute;
border-radius:50%;

cursor:pointer;

}


.saturn{


width:260px;
height:260px;

right:-50px;
top:90px;


background:
radial-gradient(circle at 30% 30%,
#ffe4a3,
#b67842,
#392116);


box-shadow:
0 0 100px #d8a56b;


}


.saturn:after{

content:"";

position:absolute;

width:380px;
height:90px;

border:18px solid rgba(240,210,150,.5);

border-radius:50%;

left:-60px;
top:85px;

transform:rotate(-20deg);

}



.moon{

width:70px;
height:70px;

background:#aaa;

left:15%;
top:25%;

box-shadow:0 0 40px #fff;

}



.blue{

width:100px;
height:100px;

right:20%;
bottom:15%;

background:
radial-gradient(circle,#5de0ff,#203070);

}



/* ship */


.ship{

position:absolute;

font-size:55px;

left:-100px;
top:45%;

animation:travel 20s linear infinite;

}


@keyframes travel{


to{

left:110%;

transform:rotate(8deg);

}

}





/* UI */


.wrapper{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}



.panel{


width:min(700px,95%);


background:

linear-gradient(
145deg,
rgba(255,255,255,.12),
rgba(0,0,0,.55)
);


border:

1px solid rgba(180,220,255,.4);


border-radius:25px;


padding:40px;


backdrop-filter:blur(15px);


box-shadow:

0 0 80px rgba(90,170,255,.2);



text-align:center;


}



.header{

letter-spacing:8px;

font-size:14px;

opacity:.6;

margin-bottom:30px;

}



h1{

font-size:
clamp(30px,7vw,60px);


margin-bottom:30px;

}



.message{


font-size:
clamp(16px,3vw,23px);


line-height:1.7;

min-height:170px;

}



button{


margin-top:25px;

padding:16px 50px;


background:

linear-gradient(90deg,#9be8ff,#ffffff);


border:none;

border-radius:40px;


font-family:inherit;

font-weight:bold;

cursor:pointer;


transition:.4s;


}



button:hover{

transform:scale(1.08);

box-shadow:
0 0 40px #9be8ff;

}



.status{


position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:12px;

opacity:.6;

}



.popup{


position:absolute;

padding:20px;

background:#050817dd;

border:1px solid #7ddcff;

border-radius:15px;

display:none;

}

/* COSMIC TRANSITION */

#cosmicTransition{

position:fixed;

inset:0;

background:
radial-gradient(circle,#14264d,#02040d 70%);

z-index:999;

display:flex;

align-items:center;
justify-content:center;

opacity:0;

pointer-events:none;

transition:opacity 1s;

}


#cosmicTransition.active{

opacity:1;

}



.scanLine{

position:absolute;

width:0;
height:2px;

background:#bdeaff;

box-shadow:
0 0 40px #8bdcff,
0 0 100px #8bdcff;


animation:none;

}


#cosmicTransition.active .scanLine{

animation:

scan 2s forwards;

}



@keyframes scan{


0%{

width:0;

}


50%{

width:100%;

}


100%{

width:0;

}


}




.transitionText{

text-align:center;

opacity:0;

transform:scale(.8);

}


#cosmicTransition.active .transitionText{

animation:

appear 3s forwards;

}



.transitionText span{

font-size:13px;

letter-spacing:8px;

opacity:.6;

}



.transitionText h2{

margin-top:25px;

font-size:
clamp(25px,5vw,55px);


letter-spacing:5px;

}



@keyframes appear{


0%{

opacity:0;
transform:scale(.8);

}


40%{

opacity:1;
transform:scale(1);

}


100%{

opacity:1;

}


}

</style>

</head>


<body>



<div class="saturn planet" onclick="planetMessage('saturn')"></div>

<div class="moon planet" onclick="planetMessage('moon')"></div>

<div class="blue planet" onclick="planetMessage('blue')"></div>


<div class="ship">
🚀
</div>

<!-- COSMIC TRANSITION -->

<div id="cosmicTransition">

    <div class="scanLine"></div>

    <div class="transitionText">
        <span>INCOMING TRANSMISSION</span>
        <h2 id="transitionMessage">
            A NEW JOURNEY BEGINS
        </h2>
    </div>

</div>

<div class="wrapper">


<div class="panel">


<div class="header">

PRIVATE COSMIC TRANSMISSION

</div>


<h1>
For You ✦
</h1>


<div id="message" class="message">

I don't think I really want to play destiny...

<br><br>

but I know I want to play with you.

</div>


<button onclick="next()">

CONTINUE

</button>


</div>


</div>



<div class="status">

CONNECTED • LOVE SIGNAL STABLE • DISTANCE: 0 LIGHT YEARS

</div>



<div id="popup" class="popup"></div>




<script>


// create stars


for(let i=0;i<250;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=
(1+Math.random()*4)+"s";


document.body.appendChild(s);

}



// cursor effects


function particle(x,y){

let p=document.createElement("div");

p.className="particle";

p.style.left=x+"px";

p.style.top=y+"px";

document.body.appendChild(p);


setTimeout(()=>p.remove(),900);


}


document.addEventListener(
"mousemove",
e=>particle(e.clientX,e.clientY)
);


document.addEventListener(
"touchmove",
e=>{

let t=e.touches[0];

particle(t.clientX,t.clientY);

}

);






let stage=0;


let texts=[


`
Maybe I don't understand every universe,
every adventure,
or every mystery...

But I want to learn yours.

<br><br>

I want to explore the stars
with my favorite person.
`,


`
I might pay for this universe...

Maybe for our anniversary.

Not because of the game.

Because I want to understand
something that makes you happy.

`,


`

So I imagined us somewhere here.

Floating between rings,
stars,
and impossible dreams.

`,


`
Every explorer needs someone
beside them.

And if you let me...

I'll be in your fireteam,
through every galaxy.

`,


`
Transmission complete.

Thank you for being
my favorite place in the universe.

❤️

`

];



function next(){

if(stage<texts.length){

document.getElementById("message").innerHTML=
texts[stage];

stage++;

if(stage === 1){

cosmicTransition(
"TRANSMISSION ACCEPTED<br><br>ENTERING YOUR UNIVERSE"
);

}


if(stage === 3){

cosmicTransition(
"NEW COORDINATES FOUND<br><br>SATURN ORBIT LOCKED"
);

}


if(stage === 5){

cosmicTransition(
"FINAL MESSAGE RECEIVED<br><br>YOU ARE MY FAVORITE STAR"
);

}

}

else{

document.querySelector("button").innerHTML=
"TRANSMISSION SAVED ✦";

}

}




// planet secrets


function planetMessage(type){

let p=document.getElementById("popup");


let messages={

saturn:
"Saturn archive : The place you chose. A beautiful world deserves a beautiful memory.",


moon:
"Moon signal detected : A small reminder that even lonely places can hold warmth.",


blue:
"Unknown planet : Coordinates locked. Maybe our next adventure."

};


p.innerHTML=messages[type];

p.style.display="block";

p.style.left="50%";

p.style.top="20%";

setTimeout(()=>p.style.display="none",4000);

}



// keyboard easter eggs


document.addEventListener(
"keydown",
e=>{


if(e.key==="g"){

alert(
"Hidden message : The stars were brighter after I found you."
);

}


if(e.key==="s"){

document.body.style.filter=
"brightness(1.4)";

setTimeout(()=>{
document.body.style.filter="";
},1000);

}


});

function cosmicTransition(message, callback){

let screen =
document.getElementById("cosmicTransition");


let text =
document.getElementById("transitionMessage");


text.innerHTML=message;


screen.classList.add("active");


setTimeout(()=>{

screen.classList.remove("active");


if(callback){
callback();
}


},3500);


}

</script>


</body>
</html>
